# 운영 전용 오버라이드. 나머지 설정은 application.properties를 그대로 상속함.
# ddl-auto=update는 배포마다 엔티티 변경분을 검토 없이 운영 DB에 즉시 반영하는 위험이 있어,
# 운영에서는 엔티티-스키마 불일치를 감지만 하고 직접 반영은 하지 않는 validate로 전환.
spring.jpa.hibernate.ddl-auto=validate

spring.data.redis.host=redis
spring.data.redis.port=6379

