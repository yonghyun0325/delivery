name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

concurrency:
  group: cd-ec2-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd ~/delivery

            git fetch origin
            git checkout main
            git reset --hard origin/main

            cat > .env << 'ENVEOF'
            DB_USER=${{ secrets.EC2_DB_USER }}
            DB_PASSWORD=${{ secrets.EC2_DB_PASSWORD }}
            JWT_ACCESS_SECRET=${{ secrets.EC2_JWT_ACCESS_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.EC2_JWT_REFRESH_SECRET }}
            ENCRYPT_KEY=${{ secrets.EC2_ENCRYPT_KEY }}
            ENCRYPT_SALT=${{ secrets.EC2_ENCRYPT_SALT }}
            GEMINI_API_KEY=${{ secrets.EC2_GEMINI_API_KEY }}
            GEMINI_MODEL=${{ secrets.EC2_GEMINI_MODEL }}
            GEMINI_BASE_URL=${{ secrets.EC2_GEMINI_BASE_URL }}
            ENVEOF
            chmod 600 .env

            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f
