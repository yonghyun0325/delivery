services:
  postgres:
    image: postgres:17
    container_name: delivery-postgres
    restart: always

    environment:
      POSTGRES_DB: delivery
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - delivery-postgres-data:/var/lib/postgresql/data

    ports:
      # EC2 자기 자신(loopback)에서만 접속 가능 - SSH 터널용, 외부 인터넷에는 노출 안 됨
      - "127.0.0.1:5432:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d delivery"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.4
    container_name: delivery-redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - delivery-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: delivery-app
    restart: always

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    env_file:
      - .env

    environment:
      # 컨테이너 네트워크 안에서는 postgres 서비스명으로 접속
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/delivery
      # application-prod.properties(ddl-auto=validate 등 운영 전용 오버라이드) 활성화
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: prod

    ports:
      - "8080:8080"

volumes:
  delivery-postgres-data:
  delivery-redis-data: