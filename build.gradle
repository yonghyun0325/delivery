plugins {
    id 'java'
    id 'org.springframework.boot' version '4.0.7'
    id 'io.spring.dependency-management' version '1.1.7'
    // Google Java Style(AOSP) 기반으로 코드 자동 정렬
    id 'com.diffplug.spotless' version '6.25.0'
}

group = 'com.delivery'
version = '0.0.1-SNAPSHOT'
description = 'delivery'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    // 스프링부트 4.x 버전에 맞도록 버전 업
    implementation 'org.springframework.boot:spring-boot-starter-webmvc'
    implementation 'org.springframework.boot:spring-boot-starter-restclient'

    // .env 파일을 Spring Environment로 로드 (로컬 개발용)
    implementation 'me.paulschwarz:springboot3-dotenv:5.1.0'

    // UUID v7, 시간 정렬 가능으로 인덱스 성능 향상
    implementation 'com.github.f4b6a3:uuid-creator:6.1.1'

    // 카페인 캐시
    implementation("org.springframework.boot:spring-boot-starter-cache")
    implementation("com.github.ben-manes.caffeine:caffeine:3.1.8")

    runtimeOnly 'org.postgresql:postgresql'

    // 스프링 4에선 직접 넣어야함
    implementation 'org.apache.httpcomponents.client5:httpclient5'

    implementation 'io.jsonwebtoken:jjwt-api:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.11.5'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.11.5'

    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    // 스프링 4에서는 기본적으로 지원 안함
    testImplementation 'org.springframework.boot:spring-boot-starter-webmvc-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-data-jpa-test'

    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-security-test'

    // 테스트 컨테이너 스프링부트 4.x 버전에 맞도록 버전 업
    testImplementation 'org.testcontainers:testcontainers:1.21.4'
    testImplementation 'org.testcontainers:junit-jupiter:1.21.4'
    testImplementation 'org.testcontainers:postgresql:1.21.4'

    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Swagger 스프링부트 4.x 버전에 맞도록 버전 업
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'
    implementation 'org.springdoc:springdoc-openapi-starter-webmvc-scalar:3.0.3'

    //QueryDSL 스프링부트 4.x 버전에 맞도록 버전 업
    implementation 'com.querydsl:querydsl-jpa:5.1.0:jakarta'
    annotationProcessor "com.querydsl:querydsl-apt:5.1.0:jakarta"
    annotationProcessor "jakarta.persistence:jakarta.persistence-api"
    annotationProcessor "jakarta.annotation:jakarta.annotation-api"
}

tasks.named('test') {
    useJUnitPlatform()

    testLogging {
        events "passed", "skipped", "failed"
        outputs.upToDateWhen { false }
    }
}

spotless {
    java {
        googleJavaFormat('1.22.0').aosp().reflowLongStrings()
    }
}

tasks.named('build') {
    // build 실행 전 코드 포맷 자동 적용
    dependsOn 'spotlessApply'
}

test {
    maxParallelForks = 2
}